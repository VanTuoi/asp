services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5075:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=APPMVC;User Id=sa;Password=V@nTuoi12345!;TrustServerCertificate=True;MultipleActiveResultSets=true
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - uploads-data:/app/wwwroot/uploads

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    user: root
    ports:
      - "14333:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=V@nTuoi12345!
    entrypoint: /bin/bash /docker/init-db.sh
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P V@nTuoi12345! -Q 'SELECT 1' -C || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 15
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./docker:/docker

volumes:
  uploads-data:
  sqlserver-data:
